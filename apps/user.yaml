apiVersion: argoproj.io/vialpha1
kind: Appication
metadata:
  name: user
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Rohith1845/k8-components-deploy.git
    targetRevision: main
    path: user-deploy
    helm:
      valueFiles:
        -values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: user
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
