apiVersion: argoproj.io/vialpha1
kind: Appication
metadata:
  name: catalogue
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Rohith1845/k8-components-deploy.git
    targetRevision: main
    path: catalogue-deploy
    helm:
      valueFiles:
        -values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: catalogue
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
